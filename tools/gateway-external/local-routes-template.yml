_format_version: '2.1'
_transform: true
services:

#
# Handles local computer requests from the console client to the autonomous agent
#
- name: autonomous-agent-card
  url: http://host.docker.internal:3000/.well-known/agent-card.json
  routes:
  - name: autonomous-agent-card
    hosts:
    - localhost
    paths:
    - /a2a/.well-known/agent-card.json

#
# The gateway uses token exchange to deliver a JWT access token with reduced scopes to the autonomous agent
#
- name: autonomous-agent
  url: http://host.docker.internal:3000
  routes:
  - name: autonomous-agent
    hosts:
    - localhost
    paths:
    - /a2a
  plugins:
  - name: request-transformer
    config:
      replace:
        uri: "/$(uri_captures[1])"
  - name: token-exchange
    config:
      token_endpoint: http://idsvr:8443/oauth/v2/oauth-token
      client_id: external-gateway-client
      client_secret: $GATEWAY_TOKEN_EXCHANGE_SECRET
      token_cache_seconds: 900
      target_scope: 'stocks/read'
