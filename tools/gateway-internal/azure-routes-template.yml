_format_version: '2.1'
_transform: true
services:

#
# Handles Azure internal requests from the autonomous agent to the secured MCP server
#
- name: portfolio-mcp-server-resource-metadata
  url: http://portfolio-mcp-server-$AZURE_ENV_NAME/.well-known/oauth-protected-resource
  routes:
  - name: portfolio-mcp-server-resource-metadata
    hosts:
    - gateway-internal-$AZURE_ENV_NAME
    paths:
    - /mcp/.well-known/oauth-protected-resource

#
# Use a plugin to write an audit log with token details for secured agent requests
#
- name: portfolio-mcp-server
  url: http://portfolio-mcp-server-$AZURE_ENV_NAME
  routes:
  - name: portfolio-mcp-server
    hosts:
    - gateway-internal-$AZURE_ENV_NAME
    paths:
    - /mcp
  plugins:
  - name: request-transformer
    config:
      replace:
        uri: "/$(uri_captures[1])"
  - name: token-audit
 